# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # CPU and memory allocation
  cpu: 1
  memoryMiB: 512
  # Maximum concurrent requests
  concurrency: 80
  # Minimum instances (0 = scale to zero)
  minInstances: 0
  maxInstances: 10

env:
  # Firebase public web config (safe for browser bundle)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCAWEaebtsRtFUDaWtHkCsTYklkGMIlmK0
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: creations3d-dev.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: creations3d-dev
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: creations3d-dev.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: 1066348152293
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:1066348152293:web:87a26540633c7ca274db0c

  # Replicate API (3D Object Generation)
  - variable: REPLICATE_API_TOKEN
    secret: replicate-api-token

  # World Labs API is intentionally omitted until the production key is in
  # Secret Manager. The route fails closed and refunds reserved credits without it.
  - variable: NEXT_PUBLIC_WORLD_GENERATION_ENABLED
    value: "false"

  # Cloudflare R2 Storage
  - variable: R2_ACCOUNT_ID
    secret: r2-account-id
  - variable: R2_ACCESS_KEY_ID
    secret: r2-access-key-id
  - variable: R2_SECRET_ACCESS_KEY
    secret: r2-secret-access-key
  - variable: R2_BUCKET_NAME
    value: creations3d-models
  - variable: R2_PUBLIC_URL
    value: https://models.creations3d.com

  # Whop Payments
  - variable: WHOP_API_KEY
    secret: whop-api-key
  - variable: WHOP_COMPANY_ID
    secret: whop-company-id
  - variable: WHOP_WEBHOOK_SECRET
    secret: whop-webhook-secret

# Note: Firebase credentials are auto-provided by App Hosting
# - FIREBASE_WEBAPP_CONFIG (client-side)
# - FIREBASE_CONFIG (server-side)
# - Application Default Credentials for Admin SDK
